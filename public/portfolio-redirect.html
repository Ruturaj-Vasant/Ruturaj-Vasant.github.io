<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ruturaj Vasant Tambe</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }
  </style>
  <script>
    (function () {
      var portfolioUrl = 'https://ruturaj-vasant.github.io/';
      var scriptUrl = 'https://script.google.com/macros/s/AKfycbzvUzb1mWeHyb0G43mVQif9Qa3H9XWjtxol65GCHTGfpCVMpy8VLPdygPg_ZbALlMP2/exec';
      var params = new URLSearchParams(window.location.search);
      var trackingId = params.get('id') || '';

      if (trackingId) {
        var beacon = new Image();
        beacon.src = scriptUrl + '?action=portfolio&id=' + encodeURIComponent(trackingId) + '&t=' + Date.now();
      }

      window.location.replace(portfolioUrl);
    }());
  </script>
</head>
<body></body>
</html>
