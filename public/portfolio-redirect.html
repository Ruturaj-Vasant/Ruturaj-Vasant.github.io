<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ruturaj Vasant Tambe</title>
  <script>
    (function () {
      var portfolioUrl = 'https://ruturaj-vasant.github.io/';
      var scriptUrl = 'https://script.google.com/macros/s/AKfycbzcOEqKMMht1oZW2LOvayP6M7ZCu-tuAcwy-RoBr6iEGZYKCM8Wu9czqFv3f7WgFVAJ8w/exec';
      var params = new URLSearchParams(window.location.search);
      var trackingId = params.get('id') || '';

      if (trackingId) {
        var beacon = new Image();
        beacon.src = scriptUrl + '?action=portfolio_ping&id=' + encodeURIComponent(trackingId) + '&t=' + Date.now();
      }

      window.setTimeout(function () {
        window.location.replace(portfolioUrl);
      }, 180);
    }());
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://ruturaj-vasant.github.io/">ruturaj-vasant.github.io</a>.</p>
</body>
</html>
