<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 160" width="256" height="160">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="256" height="160" fill="#0B1220"/>
  <rect x="12" y="12" width="232" height="136" rx="10" fill="#0F172A" stroke="#1F2937" stroke-width="2"/>

  <!-- Container blocks -->
  <g fill="#111827" stroke="#374151" stroke-width="2">
    <rect x="28" y="34" width="64" height="36" rx="6"/>
    <rect x="96" y="34" width="64" height="36" rx="6"/>
    <rect x="164" y="34" width="64" height="36" rx="6"/>

    <rect x="28" y="80" width="64" height="36" rx="6"/>
    <rect x="96" y="80" width="64" height="36" rx="6"/>
    <rect x="164" y="80" width="64" height="36" rx="6"/>
  </g>

  <!-- Service node highlight -->
  <rect x="164" y="80" width="64" height="36" rx="6" fill="url(#g)" opacity="0.25"/>
  
  <!-- AI chip icon -->
  <g transform="translate(184, 88)">
    <rect x="0" y="0" width="24" height="20" rx="3" fill="url(#g)"/>
    <text x="12" y="14" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle" fill="#FFFFFF" font-weight="700">AI</text>
  </g>

  <!-- Connections -->
  <g stroke="#334155" stroke-width="2" fill="none">
    <path d="M60 52 H96"/>
    <path d="M128 52 H164"/>
    <path d="M60 98 H96"/>
    <path d="M128 98 H164"/>
  </g>

  <!-- Title -->
  <text x="16" y="28" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#94A3B8" opacity="0.9">AI Service in Container</text>
</svg>
