<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ruturaj Vasant Tambe</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }
  </style>
  <script>
    (function () {
      var portfolioUrl = 'https://ruturaj-vasant.github.io/';
      var scriptUrl = 'https://script.google.com/macros/s/AKfycbzvUzb1mWeHyb0G43mVQif9Qa3H9XWjtxol65GCHTGfpCVMpy8VLPdygPg_ZbALlMP2/exec';
      var params = new URLSearchParams(window.location.search);
      var trackingId = params.get('id') || '';
      var pingUrl = scriptUrl + '?action=portfolio&id=' + encodeURIComponent(trackingId) + '&redirect=0&t=' + Date.now();
      var redirected = false;

      function redirectNow() {
        if (redirected) {
          return;
        }
        redirected = true;
        window.location.replace(portfolioUrl);
      }

      function trackWithImage() {
        return new Promise(function (resolve) {
          var image = new Image(1, 1);
          var done = false;

          function finish() {
            if (done) {
              return;
            }
            done = true;
            resolve();
          }

          image.onload = finish;
          image.onerror = finish;
          image.decoding = 'async';
          image.src = pingUrl;
          window.setTimeout(finish, 1200);
        });
      }

      function trackWithFetch() {
        if (!window.fetch) {
          return Promise.resolve();
        }

        return fetch(pingUrl, {
          method: 'GET',
          mode: 'no-cors',
          keepalive: true,
          cache: 'no-store'
        }).catch(function () {});
      }

      if (trackingId) {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(pingUrl);
        }

        Promise.race([
          Promise.all([trackWithFetch(), trackWithImage()]),
          new Promise(function (resolve) {
            window.setTimeout(resolve, 1500);
          })
        ]).then(redirectNow);
      } else {
        redirectNow();
      }
    }());
  </script>
</head>
<body></body>
</html>
