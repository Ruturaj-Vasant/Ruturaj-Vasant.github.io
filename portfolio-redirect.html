<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Ruturaj Vasant Tambe</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
    }
  </style>
  <script>
    (function () {
      var portfolioUrl = 'https://ruturaj-vasant.github.io/';
      var scriptUrl = 'https://script.google.com/macros/s/AKfycbzvUzb1mWeHyb0G43mVQif9Qa3H9XWjtxol65GCHTGfpCVMpy8VLPdygPg_ZbALlMP2/exec';
      var params = new URLSearchParams(window.location.search);
      var trackingId = params.get('id') || '';
      var pingUrl = scriptUrl + '?action=portfolio&id=' + encodeURIComponent(trackingId) + '&t=' + Date.now();

      if (trackingId) {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(pingUrl);
        }

        if (window.fetch) {
          fetch(pingUrl, {
            method: 'GET',
            mode: 'no-cors',
            keepalive: true,
            cache: 'no-store'
          }).catch(function () {});
        }

        var beacon = new Image(1, 1);
        beacon.decoding = 'async';
        beacon.src = pingUrl;
      }

      window.setTimeout(function () {
        window.location.replace(portfolioUrl);
      }, trackingId ? 350 : 0);
    }());
  </script>
</head>
<body></body>
</html>
